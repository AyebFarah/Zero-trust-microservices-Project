apiVersion: v1
kind: ConfigMap
metadata:
  name: security-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  security-dashboard.json: |
    {
      "title": "Zero-Trust Security Scores",
      "uid": "zerotrust-v1",
      "schemaVersion": 38,
      "refresh": "15s",
      "time": {"from": "now-30m", "to": "now"},
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Score Total par Service",
          "gridPos": {"x":0,"y":0,"w":12,"h":4},
          "targets": [{"expr": "security_score_total", "legendFormat": "{{service}} [{{status}}]"}],
          "options": {
            "colorMode": "background",
            "thresholds": {
              "steps": [
                {"color":"red","value":0},
                {"color":"orange","value":0.5},
                {"color":"green","value":0.8}
              ]
            }
          }
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Évolution Score Total (30 min)",
          "gridPos": {"x":0,"y":4,"w":24,"h":8},
          "targets": [{"expr": "security_score_total", "legendFormat": "{{service}}"}]
        },
        {
          "id": 3,
          "type": "gauge",
          "title": "Composante C — mTLS",
          "gridPos": {"x":0,"y":12,"w":4,"h":6},
          "targets": [{"expr": "security_score{component='C'}", "legendFormat": "{{service}}"}],
          "options": {"minValue":0,"maxValue":1}
        },
        {
          "id": 4,
          "type": "gauge",
          "title": "Composante I — OPA",
          "gridPos": {"x":4,"y":12,"w":4,"h":6},
          "targets": [{"expr": "security_score{component='I'}", "legendFormat": "{{service}}"}],
          "options": {"minValue":0,"maxValue":1}
        },
        {
          "id": 5,
          "type": "gauge",
          "title": "Composante B — Falco",
          "gridPos": {"x":8,"y":12,"w":4,"h":6},
          "targets": [{"expr": "security_score{component='B'}", "legendFormat": "{{service}}"}],
          "options": {"minValue":0,"maxValue":1}
        },
        {
          "id": 6,
          "type": "gauge",
          "title": "Composante P — Policy",
          "gridPos": {"x":12,"y":12,"w":4,"h":6},
          "targets": [{"expr": "security_score{component='P'}", "legendFormat": "{{service}}"}],
          "options": {"minValue":0,"maxValue":1}
        },
        {
          "id": 7,
          "type": "gauge",
          "title": "Composante R — Reliability",
          "gridPos": {"x":16,"y":12,"w":4,"h":6},
          "targets": [{"expr": "security_score{component='R'}", "legendFormat": "{{service}}"}],
          "options": {"minValue":0,"maxValue":1}
        },
        {
          "id": 8,
          "type": "stat",
          "title": "Services Isolés (score < 0.5)",
          "gridPos": {"x":20,"y":12,"w":4,"h":6},
          "targets": [{"expr": "count(security_score_total < 0.5) or vector(0)", "legendFormat": "Services isolés"}],
          "options": {"colorMode":"background","thresholds":{"steps":[{"color":"green","value":0},{"color":"red","value":1}]}}
        },
        {
          "id": 9,
          "type": "barchart",
          "title": "Alertes Falco par Service (5 min)",
          "gridPos": {"x":0,"y":18,"w":12,"h":8},
          "targets": [
            {"expr": "increase(falco_events_total{priority='Critical'}[5m])", "legendFormat": "CRITICAL {{container_name}}"},
            {"expr": "increase(falco_events_total{priority='Warning'}[5m])", "legendFormat": "WARNING {{container_name}}"}
          ]
        },
        {
          "id": 10,
          "type": "stat",
          "title": "Violations OPA (5 min)",
          "gridPos": {"x":12,"y":18,"w":6,"h":8},
          "targets": [{"expr": "increase(opa_violations_total[5m]) or vector(0)", "legendFormat": "Violations"}],
          "options": {"colorMode":"background","thresholds":{"steps":[{"color":"green","value":0},{"color":"orange","value":1},{"color":"red","value":5}]}}
        }
      ]
    }
