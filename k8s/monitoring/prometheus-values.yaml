grafana:
  adminPassword: grafana-zero-trust-2026
  sidecar:
    dashboards:
      enabled: true

prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    retention: 15d
    additionalScrapeConfigs:
    - job_name: "lsa-agents"
      kubernetes_sd_configs:
      - role: pod
        namespaces:
          names: [agents]
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        regex: "lsa-.*"
        action: keep
      - source_labels: [__meta_kubernetes_pod_ip]
        replacement: "${1}:9090"
        target_label: __address__
    - job_name: "cca"
      kubernetes_sd_configs:
      - role: pod
        namespaces:
          names: [agents]
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        regex: "cca"
        action: keep
      - source_labels: [__meta_kubernetes_pod_ip]
        replacement: "${1}:9091"
        target_label: __address__
