---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lsa-service-auth
  namespace: agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lsa-service-auth
  template:
    metadata:
      labels:
        app: lsa-service-auth
    spec:
      containers:
      - name: lsa
        image: lsa:1.0
        imagePullPolicy: Never
        ports:
        - containerPort: 9090
        env:
        - name: TARGET_SERVICE
          value: "service-auth"
        - name: CCA_URL
          value: "http://cca.agents.svc.cluster.local:8080"
        - name: OPA_URL
          value: "http://opa.security.svc.cluster.local:8181"
        - name: PROMETHEUS_URL
          value: "http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090"
        - name: COLLECT_INTERVAL
          value: "30"
        - name: METRICS_PORT
          value: "9090"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: lsa-service-auth
  namespace: agents
spec:
  selector:
    app: lsa-service-auth
  ports:
  - name: metrics
    port: 9090
    targetPort: 9090
