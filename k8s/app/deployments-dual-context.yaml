# service-payment ctx-a
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-payment-ctx-a
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-payment
      context: ctx-a
  template:
    metadata:
      labels:
        app: service-payment
        context: ctx-a
    spec:
      serviceAccountName: service-payment-sa
      containers:
      - name: service-payment
        image: service-payment:1.0
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        resources:
          requests: {memory: "64Mi", cpu: "100m"}
          limits: {memory: "256Mi", cpu: "500m"}
---
# service-payment ctx-b
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-payment-ctx-b
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-payment
      context: ctx-b
  template:
    metadata:
      labels:
        app: service-payment
        context: ctx-b
    spec:
      serviceAccountName: service-payment-sa
      containers:
      - name: service-payment
        image: service-payment:1.0
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        resources:
          requests: {memory: "64Mi", cpu: "100m"}
          limits: {memory: "256Mi", cpu: "500m"}
---
# Service payment — selector dynamique
apiVersion: v1
kind: Service
metadata:
  name: service-payment
  namespace: app
spec:
  selector:
    app: service-payment
    context: ctx-a
  ports:
  - name: http
    port: 8080
    targetPort: 8080
---
